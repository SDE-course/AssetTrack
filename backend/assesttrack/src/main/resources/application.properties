notifications.warranty-check-cron=0 0 9 * * ?
notifications.low-stock-check-cron=0 30 9 * * ?
notifications.warranty-warning-days=30
notifications.low-stock-threshold=3
notifications.low-stock-types=accessory,mouse,keyboard,dock,adapter,headset,monitor

